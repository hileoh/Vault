<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUSI 1001 Business Law Topics 08-10 Mind Map</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --ink: #162234;
      --muted: #61718a;
      --line: #b9c8dc;
      --line-soft: #dbe5f1;
      --navy: #132f68;
      --navy-2: #204286;
      --accent: #2563eb;
      --accent-text: #102a56;
      --accent-soft: #eef5ff;
      --accent-soft-2: #ffffff;
      --accent-line: #bfcef1;
      --accent-chip: #e7efff;
      --selected-accent: #b4463d;
      --card: #ffffff;
      --shadow: 0 10px 22px rgba(30, 46, 78, 0.10);
      --radius: 14px;
      --tree-gap: 17px;
      --branch-indent: clamp(22px, 3.4vw, 48px);
      --branch-pad: clamp(18px, 2.4vw, 34px);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background: var(--bg);
    }

    button, input {
      font: inherit;
      letter-spacing: 0;
    }

    .page {
      width: min(100%, 1420px);
      margin: 0 auto;
      padding: 14px clamp(14px, 2.6vw, 42px) 64px;
    }

    .root-card {
      position: sticky;
      z-index: 10;
      top: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #10275f 0%, var(--navy) 52%, var(--navy-2) 100%);
      color: #ffffff;
      box-shadow: 0 14px 32px rgba(19, 47, 104, 0.20);
    }

    .root-main {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      min-width: 0;
      align-items: center;
      gap: 12px;
    }

    .root-title {
      min-width: 0;
      margin: 0;
      overflow-wrap: anywhere;
      text-wrap: balance;
      font-size: clamp(21px, 2.5vw, 34px);
      font-weight: 840;
      line-height: 1.18;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 8px;
    }

    .tool-button {
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 9px;
      padding: 7px 11px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;
    }

    .tool-button:hover,
    .tool-button:focus-visible {
      background: rgba(255, 255, 255, 0.22);
      outline: none;
    }

    .tree {
      position: relative;
      display: grid;
      gap: var(--tree-gap);
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
    }

    .children {
      position: relative;
      display: grid;
      gap: var(--tree-gap);
      margin: 14px 0 0 var(--branch-indent);
      padding: 0 0 0 var(--branch-pad);
      border-left: 3px solid var(--accent-line);
      list-style: none;
    }

    .tree-item {
      position: relative;
      min-width: 0;
    }

    .children > .tree-item::before {
      content: "";
      position: absolute;
      left: calc(-1 * var(--branch-pad));
      top: 25px;
      width: var(--branch-pad);
      border-top: 3px solid var(--accent-line);
    }

    .node-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      width: fit-content;
      max-width: 100%;
      min-width: min(100%, 320px);
      align-items: flex-start;
      gap: 11px;
      border: 1px solid var(--line-soft);
      border-left: 5px solid var(--accent);
      border-radius: var(--radius);
      padding: 13px 18px;
      background: linear-gradient(180deg, var(--card) 0%, #fbfdff 100%);
      color: var(--ink);
      box-shadow: var(--shadow);
      text-align: left;
      cursor: pointer;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease, background 150ms ease;
    }

    .node-card:hover {
      border-color: var(--accent-line);
      box-shadow: 0 12px 25px rgba(30, 46, 78, 0.14);
      transform: translateY(-1px);
    }

    .node-card:focus-visible {
      outline: 3px solid rgba(29, 91, 191, 0.30);
      outline-offset: 3px;
    }

    .node-card.has-children {
      min-width: min(100%, 460px);
    }

    .depth-1 > .node-card,
    .depth-2 > .node-card.topic-card {
      border-color: var(--accent-line);
      border-left-color: var(--accent);
      background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent-soft-2) 100%);
      color: var(--accent-text);
    }

    .tree-item.selected > .node-card {
      border-color: var(--selected-accent);
      box-shadow: 0 0 0 2px rgba(180, 70, 61, 0.16), var(--shadow);
    }

    .toggle-chip {
      display: grid;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 1px solid var(--accent-line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--accent-text);
      font-size: 19px;
      font-weight: 860;
      line-height: 1;
    }

    .root-card .toggle-chip {
      background: #ffffff;
      color: var(--navy);
    }

    .count-chip {
      display: grid;
      flex: 0 0 auto;
      width: 31px;
      height: 31px;
      place-items: center;
      align-self: center;
      border: 1px solid var(--accent-line);
      border-radius: 999px;
      background: var(--accent-chip);
      color: var(--accent-text);
      font-size: 14px;
      font-weight: 860;
      line-height: 1;
    }

    .root-card .count-chip {
      border-color: rgba(255, 255, 255, 0.52);
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
    }

    .node-content {
      display: grid;
      min-width: 0;
      gap: 5px;
    }

    .node-title {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: clamp(15px, 1.2vw, 20px);
      font-weight: 790;
      line-height: 1.24;
    }

    .depth-1 > .node-card .node-title,
    .depth-2 > .node-card.topic-card .node-title {
      font-size: clamp(17px, 1.45vw, 23px);
      font-weight: 830;
    }

    .node-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
    }

    .node-note {
      margin-top: 6px;
      border-top: 1px solid var(--accent-line);
      padding-top: 8px;
      color: #425169;
      font-size: clamp(15px, 1.05vw, 17px);
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .note-key {
      border-radius: 5px;
      padding: 0 0.18em;
      background: var(--accent-chip);
      color: var(--accent-text);
      font-weight: 840;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .node-card.leaf-card {
      grid-template-columns: minmax(0, 1fr);
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .node-card.leaf-card.has-note {
      width: min(100%, 880px);
      max-width: 880px;
    }

    .depth-3 > .node-card.leaf-card.has-note,
    .depth-4 > .node-card.leaf-card.has-note,
    .depth-5 > .node-card.leaf-card.has-note {
      width: min(100%, 820px);
      max-width: 820px;
    }

    .node-card.leaf-card .node-title {
      font-size: clamp(16px, 1.18vw, 20px);
      line-height: 1.28;
    }

    .tree.compact-notes .node-note {
      display: none;
    }

    .empty {
      display: none;
      margin: 24px 0;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      padding: 18px;
      background: #ffffff;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .empty.visible { display: block; }

    @media (max-width: 760px) {
      :root {
        --tree-gap: 13px;
        --branch-indent: 18px;
        --branch-pad: 16px;
      }

      .page {
        padding: 10px 10px 48px;
      }

      .root-card {
        position: static;
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .node-card,
      .node-card.has-children {
        width: 100%;
        min-width: 0;
        padding: 12px 13px;
      }

      .children {
        margin-left: var(--branch-indent);
      }
    }
  

    @media print {
      .root-card { position: static; break-after: avoid; }
      .tool-button { display: none; }
      .node-card { box-shadow: none; break-inside: avoid; }
      .children { break-inside: avoid; }
      body { background: #ffffff; }
    }
  </style>
</head>

        <button class="tool-button" id="collapseAll" type="button">Collapse All</button>
        <button class="tool-button" id="toggleNotes" type="button" aria-pressed="true">Notes On</button>
      </div>
    </section>

    <ul class="tree" id="tree"></ul>
    <div class="empty" id="emptyState">No visible nodes</div>
  </main>

itlements（负债不超过100万澳元，不含员工权益）", "children": []}, {"id": "n448", "label": "No recent prior small business restructuring/simplified liquidation use（近期未用过相关程序）", "children": []}, {"id": "n449", "label": "Employee entitlements and tax lodgement requirements usually relevant（员工权益和税务申报通常相关）", "children": []}]}, {"id": "n454", "label": "Features（特点）", "children": [{"id": "n451", "label": "Debt restructuring plan（债务重组计划）", "children": []}, {"id": "n452", "label": "Moratorium applies（暂停执行）", "children": []}, {"id": "n453", "label": "Company remains in control（公司保留控制权）", "children": []}]}, {"id": "n460", "label": "Process（流程）", "children": [{"id": "n455", "label": "Appoint restructuring practitioner（任命重组从业者）", "children": []}, {"id": "n456", "label": "Continue trading（继续营业）", "children": []}, {"id": "n457", "label": "Develop plan and documents（制定计划文件）", "children": []}, {"id": "n458", "label": "Creditors vote on plan（债权人投票）", "children": []}, {"id": "n459", "label": "Plan applies or process ends（计划生效或程序结束）", "children": []}]}]}, {"id": "n487", "label": "Winding up and liquidation（清算）", "children": [{"id": "n465", "label": "Aims（目的）", "children": [{"id": "n462", "label": "Orderly distribution of assets（有序分配资产）", "children": []}, {"id": "n463", "label": "Hopelessly insolvent companies cease trading（严重无力偿债公司停止经营）", "children": []}, {"id": "n464", "label": "Investigation of company affairs（调查公司事务）", "children": []}]}, {"id": "n470", "label": "Commencement（开始方式）", "children": [{"id": "n466", "label": "Members voluntary winding up by special resolution（成员自愿清算）", "children": []}, {"id": "n467", "label": "Creditors voluntary winding up（债权人自愿清算）", "children": []}, {"id": "n468", "label": "Compulsory winding up for insolvency - ss 459A, 459C（法院强制清算）", "children": []}, {"id": "n469", "label": "ASIC administrative power in limited late-filing situations（ASIC特定行政清算权）", "children": []}]}, {"id": "n475", "label": "Presumptions of insolvency（无力偿债推定）", "children": [{"id": "n471", "label": "Current insolvency for winding up - s 459C（当前无力偿债）", "children": []}, {"id": "n472", "label": "Past insolvency for recovery proceedings - s 588E（过去无力偿债）", "children": []}, {"id": "n473", "label": "Failure to comply with statutory demand（未遵守法定偿债要求）", "children": []}, {"id": "n474", "label": "Execution returned unsatisfied and other indicators（执行未果等）", "children": []}]}, {"id": "n480", "label": "Statutory demand（法定偿债要求）", "children": [{"id": "n476", "label": "Creditor serves demand under s 459E（债权人送达要求）", "children": []}, {"id": "n477", "label": "Company has 21 days to comply - s 459F（21天内履行）", "children": []}, {"id": "n478", "label": "Or apply to set aside - s 459G（或申请撤销）", "children": []}, {"id": "n479", "label": "Non-compliance creates presumption of insolvency（不履行产生无力偿债推定）", "children": []}]}, {"id": "n486", "label": "Liquidator（清算人）", "children": [{"id": "n481", "label": "Collect, realise and distribute company assets（收集变现并分配资产）", "children": []}, {"id": "n482", "label": "Investigate affairs and possible recoveries（调查事务及可追回交易）", "children": []}, {"id": "n483", "label": "Main powers - s 477（主要权力）", "children": []}, {"id": "n484", "label": "Disclaim onerous property - s 568（放弃负担财产）", "children": []}, {"id": "n485", "label": "Apply to court for directions - IPSC ss 90-15, 90-20（申请法院指示）", "children": []}]}]}, {"id": "n502", "label": "Simplified liquidation（简化清算）", "children": [{"id": "n491", "label": "Eligibility（资格）", "children": [{"id": "n488", "label": "Company cannot pay debts in full within 12 months（12个月内无法全额偿债）", "children": []}, {"id": "n489", "label": "Total debts do not exceed $1 million including employee termination amounts（债务不超过100万澳元，含员工终止金额）", "children": []}, {"id": "n490", "label": "Other regulatory eligibility conditions must be met（还需满足其他条件）", "children": []}]}, {"id": "n496", "label": "Features（特点）", "children": [{"id": "n492", "label": "Simplified three-month reporting to creditors（简化三个月债权人报告）", "children": []}, {"id": "n493", "label": "Modified un  "label": "Secured creditors may enforce via receiver or mortgagee in possession（担保债权人执行）", "children": []}, {"id": "n515", "label": "Company may restructure through VA, scheme or SBR（公司重整）", "children": []}, {"id": "n516", "label": "If rescue fails, winding up/liquidation distributes assets（失败后清算分配）", "children": []}]}, {"id": "n522", "label": "IRAC checklist（IRAC检查清单）", "children": [{"id": "n518", "label": "Issue: identify role and procedure（问题：角色和程序）", "children": []}, {"id": "n519", "label": "Rule: statute + case + legal test（规则：条文+案例+测试）", "children": []}, {"id": "n520", "label": "Application: match facts to each element（适用：事实对应每个要素）", "children": []}, {"id": "n521", "label": "Conclusion: liability, remedy or likely outcome（结论：责任/救济/结果）", "children": []}]}]}]}</script>
  <script>
    const rawData = JSON.parse(document.getElementById("mindmap-data").textContent);

    const state = {
      collapsed: new Set(),
      selectedId: rawData.id,
      notesVisible: true,
      nodeById: new Map(),
      parentById: new Map(),
      depthById: new Map(),
      paletteById: new Map(),
      total: 0,
      maxDepth: 0
    };

    const dom = {
      tree: document.getElementById("tree"),
      emptyState: document.getElementById("emptyState"),
      rootToggleSign: document.getElementById("rootToggleSign"),
      rootCountLabel: document.getElementById("rootCountLabel"),
      topicView: document.getElementById("topicView"),
      expandAll: document.getElementById("expandAll"),
      collapseAll: document.getElementById("collapseAll"),
      toggleNotes: document.getElementById("toggleNotes")
    };

    const branchPalettes = [
      { accent: "#2563eb", text: "#102a56", soft: "#ecf4ff", soft2: "#ffffff", line: "#bfd0f7", chip: "#dceafe", selected: "#b4463d" },
      { accent: "#16805d", text: "#113d31", soft: "#edf9f4", soft2: "#ffffff", line: "#b8dece", chip: "#dcf5eb", selected: "#b4463d" },
      { accent: "#7c3fa0", text: "#3a2250", soft: "#f5effb", soft2: "#ffffff", line: "#dcc4ec", chip: "#f0e2fa", selected: "#b4463d" },
      { accent: "#b77900", text: "#553a03", soft: "#fff7e6", soft2: "#ffffff", line: "#efd49a", chip: "#fff0c9", selected: "#b4463d" },
      { accent: "#c2413b", text: "#55201f", soft: "#fff1f0", soft2: "#ffffff", line: "#efc0bd", chip: "#ffe1de", selected: "#8e2d2a" },
      { accent: "#0f766e", text: "#113f3d", soft: "#e9faf7", soft2: "#ffffff", line: "#b2dfda", chip: "#d8f3ef", selected: "#b4463d" },
      { accent: "#4f46e5", text: "#242462", soft: "#eef0ff", soft2: "#ffffff", line: "#c8cbff", chip: "#e1e4ff", selected: "#b4463d" },
      { accent: "#5f7f28", text: "#293c14", soft: "#f3f8ea", soft2: "#ffffff", line: "#cfdfa9", chip: "#e8f3d4", selected: "#b4463d" },
      { accent: "#be5d16", text: "#542b0e", soft: "#fff2e8", soft2: "#ffffff", line: "#efc6a8", chip: "#ffe3d0", selected: "#9b3b14" },
      { accent: "#2a7ea0", text: "#143c4c", soft: "#ecf8fc", soft2: "#ffffff", line: "#b7dce8", chip: "#d9f1f8", selected: "#b4463d" },
      { accent: "#9b4f78", text: "#4b263d", soft: "#fbf0f6", soft2: "#ffffff", line: "#e4bed4", chip: "#f7ddea", selected: "#8f315b" },
      { accent: "#68723a", text: "#34391d", soft: "#f6f7ee", soft2: "#ffffff", line: "#d6d9b7", chip: "#ecefd7", selected: "#b4463d" }
    ];

    function walk(node, depth = 0, parent = null, visitor = () => {}) {
      state.nodeById.set(node.id, node);
      state.depthById.set(node.id, depth);
      if (parent) state.parentById.set(node.id, parent.id);
      state.total += 1;
      state.maxDepth = Math.max(state.maxDepth, depth);
      visitor(node, depth, parent);
      node.children.forEach(child => walk(child, depth + 1, node, visitor));
    }

    walk(rawData);

    function assignPalette(node, palette) {
      state.paletteById.set(node.id, palette);
      node.children.forEach(child => assignPalette(child, palette));
    }

    function assignBranchPalettes() {
      state.paletteById.set(rawData.id, branchPalettes[0]);
      rawData.children.forEach((child, index) => {
        assignPalette(child, branchPalettes[index % branchPalettes.length]);
      });
    }

    assignBranchPalettes();

    function applyPalette(element, node) {
      const palette = state.paletteById.get(node.id) || branchPalettes[0];
      element.style.setProperty("--accent", palette.accent);
      element.style.setProperty("--accent-text", palette.text);
      element.style.setProperty("--accent-soft", palette.soft);
      element.style.setProperty("--accent-soft-2", palette.soft2);
      element.style.setProperty("--accent-line", palette.line);
      element.style.setProperty("--accent-chip", palette.chip);
      element.style.setProperty("--selected-accent", palette.selected);
    }

    function descendants(node) {
      return node.children.reduce((total, child) => total + 1 + descendants(child), 0);
    }

    function topicOneId() {
      const topic = rawData.children.find(node => /^Topic \d+/.test(node.label));
      return topic ? topic.id : null;
    }

    function isTopic(node) {
      return /^Topic \d+/.test(node.label) || node.label.startsWith("Exam Integration");
    }

    function compactLabel(label) {
      return label.replace(/\s+[—-]\s+/g, " - ");
    }

    function collapseBranch(id, includeSelf = true) {
      const node = state.nodeById.get(id);
      if (!node) return;
      if (includeSelf && node.children.length) state.collapsed.add(id);
      node.children.forEach(child => collapseBranch(child.id, true));
    }

    function expandAncestors(id) {
      let current = id;
      while (state.parentById.has(current)) {
        current = state.parentById.get(current);
        state.collapsed.delete(current);
      }
    }

    function setInitialState() {
      state.collapsed.clear();
      for (const [id, node] of state.nodeById) {
        if (id !== rawData.id && node.children.length) state.collapsed.add(id);
      }
      state.notesVisible = true;
      dom.toggleNotes.textContent = "Notes On";
      dom.toggleNotes.setAttribute("aria-pressed", "true");
      state.selectedId = rawData.id;
    }

    function showTopicOverview() {
      state.collapsed.clear();
      for (const [id, node] of state.nodeById) {
        if (id !== rawData.id && node.children.length) state.collapsed.add(id);
      }
      state.selectedId = rawData.id;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function expandAllNodes() {
      state.collapsed.clear();
      render();
    }

    function collapseAllNodes() {
      showTopicOverview();
    }

    function toggleNode(id) {
      const node = state.nodeById.get(id);
      if (!node) return;
      state.selectedId = id;
      if (node.children.length) {
        if (state.collapsed.has(id)) {
          expandAncestors(id);
          state.collapsed.delete(id);
        } else {
          state.collapsed.add(id);
        }
      }
      render();
    }

    function createEl(tag, className, text = "") {
      const element = document.createElement(tag);
      if (className) element.className = className;
      if (text) element.textContent = text;
      return element;
    }

    function nodeToggleSign(node) {
      if (!node.children.length) return "";
      return state.collapsed.has(node.id) ? "+" : "-";
    }

    function nodeCountText(node) {
      if (!node.children.length) return "";
      return String(node.children.length);
    }

    const preferredKeyPhrases = [
      "business structure",
      "separate legal entity",
      "limited liability",
      "unlimited liability",
      "partnership",
      "joint venture",
      "trust",
      "company",
      "Corporations Act",
      "ASIC",
      "director",
      "officer",
      "fiduciary",
      "good faith",
      "proper purpose",
      "conflict",
      "care and diligence",
      "business judgment rule",
      "insolvent trading",
      "safe harbour",
      "member remedies",
      "oppression",
      "derivative action",
      "auditor",
      "reasonable care and skill",
      "external administration",
      "receivership",
      "voluntary administration",
      "winding up",
      "liquidation"
    ];

    const highlightStopWords = new Set([
      "a", "an", "and", "are", "as", "be", "by", "can", "for", "from", "how", "in", "into",
      "is", "of", "on", "or", "so", "that", "the", "through", "to", "under", "using", "with",
      "without", "explains", "describes", "shows", "supports", "represents", "connects",
      "uses", "views", "highlights", "practical", "concept", "analysing"
    ]);

    function cleanConceptText(text) {
      return text
        .replace(/（[^）]*）/g, " ")
        .replace(/\([^)]*\)/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function hasPhrase(text, phrase) {
      return new RegExp(`(^|[^A-Za-z0-9])${escapeRegExp(phrase)}([^A-Za-z0-9]|$)`, "i").test(text);
    }

    function uniquePhrases(phrases) {
      const seen = new Set();
      return phrases.filter(phrase => {
        const key = phrase.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function normalisePhrase(text) {
      return cleanConceptText(text)
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]/gu, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function meaningfulWords(text) {
      return normalisePhrase(text)
        .split(" ")
        .filter(word => word && !highlightStopWords.has(word));
    }

    function isTitleRepeat(phrase, node) {
      const phraseWords = meaningfulWords(phrase);
      const titleWords = meaningfulWords(node.label);
      if (!phraseWords.length || !titleWords.length) return false;

      const phraseNormal = phraseWords.join(" ");
      const titleNormal = titleWords.join(" ");
      if (phraseNormal === titleNormal) return true;
      if (phraseWords.every(word => titleWords.includes(word))) return true;

      const sharedCount = phraseWords.filter(word => titleWords.includes(word)).length;
      const coversMostOfTitle = titleWords.length >= 3
        && phraseWords.length >= 3
        && sharedCount / titleWords.length >= 0.72;
      return coversMostOfTitle;
    }

    function fallbackPhrases(text, note) {
      const groups = [];
      let current = [];
      cleanConceptText(text)
        .replace(/[^\p{L}\p{N}\s-]/gu, " ")
        .split(/\s+/)
        .filter(Boolean)
        .forEach(word => {
          const normal = word.toLowerCase();
          if (highlightStopWords.has(normal)) {
            if (current.length) groups.push(current.join(" "));
            current = [];
            return;
          }
          current.push(word);
          if (current.length === 3) {
            groups.push(current.join(" "));
            current = [];
          }
        });
      if (current.length) groups.push(current.join(" "));

      return groups
        .map(phrase => phrase.trim())
        .filter(phrase => phrase.length >= 4 && phrase.length <= 42 && hasPhrase(note, phrase));
    }

    function highlightPhrases(node) {
      const note = node.note || "";
      const conceptMatch = note.match(/^Explains\s+(.+?)\s+as a practical concept/i);
      const conceptText = cleanConceptText(conceptMatch ? conceptMatch[1] : node.label);
      const candidates = [];

      preferredKeyPhrases.forEach(phrase => {
        if (hasPhrase(conceptText, phrase) && hasPhrase(note, phrase)) candidates.push(phrase);
      });

      conceptText.split(/\s*(?:→|=|\/|;|,)\s*/).forEach(part => {
        const phrase = part.trim();
        if (phrase.length >= 4 && phrase.length <= 42 && hasPhrase(note, phrase)) candidates.push(phrase);
      });

      let filtered = uniquePhrases(candidates).filter(phrase => !isTitleRepeat(phrase, node));

      if (filtered.length < 2) {
        preferredKeyPhrases.forEach(phrase => {
          if (hasPhrase(note, phrase) && !isTitleRepeat(phrase, node)) filtered.push(phrase);
        });
      }
      if (filtered.length < 2) fallbackPhrases(conceptText, note).forEach(phrase => filtered.push(phrase));
      if (filtered.length < 2) fallbackPhrases(note, note).forEach(phrase => filtered.push(phrase));

      return uniquePhrases(filtered)
        .filter(phrase => !isTitleRepeat(phrase, node))
        .slice(0, 3);
    }

    function appendHighlightedText(container, text, phrases) {
      const matches = [];
      phrases.forEach(phrase => {
        const pattern = new RegExp(`(^|[^A-Za-z0-9])(${escapeRegExp(phrase)})(?=[^A-Za-z0-9]|$)`, "i");
        const match = text.match(pattern);
        if (!match) return;
        const start = (match.index || 0) + match[1].length;
        matches.push({ start, end: start + match[2].length });
      });

      matches.sort((a, b) => a.start - b.start || b.end - a.end);
      const nonOverlapping = [];
      matches.forEach(match => {
        if (!nonOverlapping.some(existing => match.start < existing.end && match.end > existing.start)) {
          nonOverlapping.push(match);
        }
      });

      let cursor = 0;
      nonOverlapping.forEach(match => {
        if (match.start > cursor) container.append(document.createTextNode(text.slice(cursor, match.start)));
        const key = createEl("mark", "note-key", text.slice(match.start, match.end));
        container.append(key);
        cursor = match.end;
      });
      if (cursor < text.length) container.append(document.createTextNode(text.slice(cursor)));
    }

    function renderNote(node) {
      const note = createEl("span", "node-note");
      appendHighlightedText(note, node.note, highlightPhrases(node));
      return note;
    }

    function renderNode(node) {
      const depth = state.depthById.get(node.id) || 0;
      const item = createEl("li", `tree-item depth-${depth}${state.selectedId === node.id ? " selected" : ""}`);
      item.dataset.nodeId = node.id;
      applyPalette(item, node);

      const card = createEl("button", [
        "node-card",
        node.children.length ? "has-children" : "leaf-card",
        node.note ? "has-note" : "",
        isTopic(node) ? "topic-card" : ""
      ].filter(Boolean).join(" "));
      card.type = "button";
      if (node.children.length) card.setAttribute("aria-expanded", String(!state.collapsed.has(node.id)));
      card.setAttribute("aria-label", node.children.length
        ? `${state.collapsed.has(node.id) ? "Expand" : "Collapse"} ${node.label}, ${node.children.length} branches`
        : node.label);
      card.addEventListener("click", () => toggleNode(node.id));

      if (node.children.length) card.append(createEl("span", "toggle-chip", nodeToggleSign(node)));

      const content = createEl("span", "node-content");
      content.append(createEl("span", "node-title", compactLabel(node.label)));

      if (node.children.length) {
        content.append(createEl("span", "node-meta", `${node.children.length} branches · ${descendants(node)} concepts`));
      }

      if (node.note) {
        content.append(renderNote(node));
      }

      card.append(content);
      if (node.children.length) card.append(createEl("span", "count-chip", nodeCountText(node)));
      item.append(card);

      if (node.children.length && !state.collapsed.has(node.id)) {
        const children = createEl("ul", "children");
        node.children.forEach(child => children.append(renderNode(child)));
        item.append(children);
      }

      return item;
    }

    function updateRootToggle() {
      dom.rootToggleSign.textContent = nodeToggleSign(rawData);
      dom.rootCountLabel.textContent = nodeCountText(rawData);
    }

    function render() {
      dom.tree.classList.toggle("compact-notes", !state.notesVisible);
      dom.tree.innerHTML = "";
      if (!rawData.children.length) {
        dom.emptyState.classList.add("visible");
        return;
      }
      dom.emptyState.classList.remove("visible");
      rawData.children.forEach(child => dom.tree.append(renderNode(child)));
      updateRootToggle();
    }

    function bindControls() {
      document.getElementById("rootHeader").addEventListener("click", event => {
        if (event.target.closest(".tool-button")) return;
        toggleNode(rawData.id);
      });
      dom.topicView.addEventListener("click", showTopicOverview);
      dom.expandAll.addEventListener("click", expandAllNodes);
      dom.collapseAll.addEventListener("click", collapseAllNodes);
      dom.toggleNotes.addEventListener("click", () => {
        state.notesVisible = !state.notesVisible;
        dom.toggleNotes.textContent = state.notesVisible ? "Notes On" : "Notes Off";
        dom.toggleNotes.setAttribute("aria-pressed", String(state.notesVisible));
        render();
      });
    }

    function init() {
      bindControls();
      setInitialState();
      render();
    }

    init();
  </script>
</body>
</html>
